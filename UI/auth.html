<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>Login | HealthAI</title>
    <link rel="stylesheet" href="src/css/styles.css">
    <link rel="stylesheet" href="src/css/auth.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Identity Services (for Google OAuth) -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="auth-body">
    <!-- Magic UI: ambient particles -->
    <div class="auth-particle"></div><div class="auth-particle"></div>
    <div class="auth-particle"></div><div class="auth-particle"></div>
    <div class="auth-particle"></div>

    <div class="auth-container glass-panel fade-in blur-fade-in">
        <div class="auth-logo">
            <i data-lucide="activity"></i>
            <span class="sparkles-text">HealthAI</span>
        </div>
        <h2 id="auth-title">Welcome Back</h2>
        <p class="auth-subtitle" id="auth-subtitle">Secure access to your medical assistant</p>

        <!-- Primary Social Login -->
        <div class="social-login-primary">
            <button class="social-btn google" type="button" onclick="socialLogin('Google')">
                <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                <span>Continue with Google</span>
            </button>
            <button class="social-btn apple" type="button" onclick="socialLogin('Apple')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.4c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.2-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.12z"/></svg>
                <span>Continue with Apple</span>
            </button>
        </div>

        <!-- More Providers Grid -->
        <div class="social-login-grid">
            <button class="social-btn-icon microsoft" type="button" onclick="socialLogin('Microsoft')" title="Continue with Microsoft">
                <svg width="20" height="20" viewBox="0 0 24 24"><rect x="1" y="1" width="10" height="10" fill="#F25022"/><rect x="13" y="1" width="10" height="10" fill="#7FBA00"/><rect x="1" y="13" width="10" height="10" fill="#00A4EF"/><rect x="13" y="13" width="10" height="10" fill="#FFB900"/></svg>
            </button>
            <button class="social-btn-icon github" type="button" onclick="socialLogin('GitHub')" title="Continue with GitHub">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
            </button>
            <button class="social-btn-icon facebook" type="button" onclick="socialLogin('Facebook')" title="Continue with Facebook">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
            </button>
            <button class="social-btn-icon twitter" type="button" onclick="socialLogin('X')" title="Continue with X">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
            </button>
        </div>

        <div class="auth-divider">
            <span>or sign in with email</span>
        </div>

        <form class="auth-form" id="auth-form" onsubmit="event.preventDefault(); handleLogin()">
            <div id="register-fields" style="display: none;">
                <div class="input-group">
                    <label>Full Name</label>
                    <div class="input-wrapper">
                        <i data-lucide="user"></i>
                        <input type="text" placeholder="John Doe">
                    </div>
                </div>
            </div>
            <div class="input-group">
                <label>Email Address</label>
                <div class="input-wrapper">
                    <i data-lucide="mail"></i>
                    <input type="email" placeholder="name@example.com" required>
                </div>
            </div>
            <div class="input-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <i data-lucide="lock"></i>
                    <input type="password" id="auth-password" placeholder="••••••••" required>
                    <button type="button" class="toggle-password" id="toggle-password"><i data-lucide="eye"></i></button>
                </div>
                <div class="password-strength" id="password-strength" style="display: none;">
                    <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
                    <span class="strength-text" id="strength-text">Weak</span>
                </div>
            </div>
            <div class="auth-options">
                <label><input type="checkbox"> Remember me</label>
                <a href="#">Forgot password?</a>
            </div>
            <button type="submit" class="primary-btn auth-btn" id="submit-btn">Sign In</button>
        </form>

        <p class="auth-footer" id="auth-footer-text">Don't have an account? <a href="#" onclick="toggleAuth(event)">Create account</a></p>
    </div>

    <!-- Social Login Toast -->
    <div class="auth-toast" id="auth-toast" style="display:none;">
        <i data-lucide="check-circle" style="width:18px;height:18px;color:var(--success-color);"></i>
        <span id="auth-toast-text">Connecting to provider...</span>
    </div>

    <script type="module" src="src/js/auth.js"></script>
</body>
</html>
