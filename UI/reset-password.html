<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>Reset Password | HealthAI</title>
    <link rel="stylesheet" href="src/css/styles.css">
    <link rel="stylesheet" href="src/css/auth.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <a href="auth.html" class="auth-logo">
                    <i data-lucide="heart-pulse"></i>
                    <span>HealthAI</span>
                </a>
                <h1>Reset Your Password</h1>
                <p class="auth-subtitle">Enter your new password below.</p>
            </div>
            <form id="reset-form" class="auth-form">
                <div class="form-group">
                    <label for="password">New Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter new password" required minlength="8" autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label for="password-confirm">Confirm Password</label>
                    <input type="password" id="password-confirm" name="password-confirm" placeholder="Confirm new password" required minlength="8" autocomplete="new-password">
                </div>
                <div id="error-message" class="auth-error" style="display:none;"></div>
                <div id="success-message" class="auth-success" style="display:none;"></div>
                <button type="submit" class="auth-btn primary" id="submit-btn">Reset Password</button>
            </form>
        </div>
    </div>
    <script type="module">
        import { apiPasswordResetConfirm } from './src/js/api.js';

        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');

        const form = document.getElementById('reset-form');
        const errorMsg = document.getElementById('error-message');
        const successMsg = document.getElementById('success-message');
        const submitBtn = document.getElementById('submit-btn');

        if (!token) {
            errorMsg.style.display = 'block';
            errorMsg.textContent = 'No reset token found. Please request a new password reset link.';
            submitBtn.disabled = true;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            const password = document.getElementById('password').value;
            const confirm = document.getElementById('password-confirm').value;

            if (password !== confirm) {
                errorMsg.style.display = 'block';
                errorMsg.textContent = 'Passwords do not match.';
                return;
            }

            if (password.length < 8) {
                errorMsg.style.display = 'block';
                errorMsg.textContent = 'Password must be at least 8 characters.';
                return;
            }

            try {
                submitBtn.disabled = true;
                submitBtn.textContent = 'Resetting...';
                await apiPasswordResetConfirm(token, password);
                successMsg.style.display = 'block';
                successMsg.textContent = 'Password reset successfully! Redirecting to login...';
                form.style.display = 'none';
                setTimeout(() => { window.location.href = 'auth.html'; }, 2000);
            } catch (err) {
                errorMsg.style.display = 'block';
                errorMsg.textContent = err.message || 'Reset failed. The link may be expired.';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Reset Password';
            }
        });

        lucide.createIcons();
    </script>
</body>
</html>
